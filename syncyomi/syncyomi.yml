services:
  syncyomi:
    container_name: syncyomi
    image: ghcr.io/syncyomi/syncyomi:latest
    restart: unless-stopped
    environment:
      - TZ=${TZ}
    volumes:
      - ./syncyomi/config:/config
    ports:
      - 8282:8282
    labels:
      - "docktail.service.enable=true"
      - "docktail.service.name=syncyomi"
      - "docktail.service.port=8282"
      - "docktail.service.service-port=443"
      - "docktail.tags=tag:doctail"
